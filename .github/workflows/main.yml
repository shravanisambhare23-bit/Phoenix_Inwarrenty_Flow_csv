name: Run API Tests
on :
  push :
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 02 * * * # 8 am ISt
    - cron: 00 14 * * *  #7:30 pm IST every day
    - cron: 00 06 * * 1-5 # 11:30 IST from monday to friday

jobs: 
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run postman Collection with newman
        run: |
          mkdir -p newman
          
          newman run 'Variables_Inwarrenty_Flow_csv.postman_collection.json' \
          -e QA.postman_environment.json \
          -d testdate.csv \
          -r cli, htmlextra
          --reporter-htmlextra-export newman/report.html

      - name: Newman Report
        if: always() #ensure thst the archive executed irrespective whether the previous step has passed or not
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newman Report
          path: newman/*.html
